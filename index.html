<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyun's Premium Archive</title>
    
    <!-- React & Babel (JSX Parser) -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Design Engines (Tailwind CSS & Lucide Icons) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+KR:wght@400;700;900&display=swap');
        
        body { 
            background-color: #F9F8F3; 
            font-family: 'Inter', 'Noto Sans KR', sans-serif; 
            margin: 0; 
            -webkit-font-smoothing: antialiased;
        }
        
        /* 스크롤바 숨기기 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 카드 스냅 설정 */
        .snap-x {
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
        }
        .snap-center {
            scroll-snap-align: center;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- React 코드가 브라우저에서 직접 실행됨 -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [isMenuOpen, setIsMenuOpen] = useState(false);

            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [isMenuOpen]);

            const posts = [
                { id: 1, tag: 'Fitness', title: 'SBD 1RM Strength Level Calculator', desc: '데이터 기반 스트렝스 분석 도구 v1.0 설계 기록.', date: 'APR 03', color: '#00704A' },
                { id: 2, tag: 'Study', title: 'Cell Biology: ATP Synthesis Process', desc: '캠벨 생명과학 핵심 요약 아카이브 v2.', date: 'APR 01', color: '#1D4ED8' },
                { id: 3, tag: 'Photo', title: 'Fujifilm X-T5 Classic Negative Recipe', desc: '봄날의 감성을 담은 필름 시뮬레이션 설정값.', date: 'MAR 28', color: '#B45309' }
            ];

            return (
                <div className="min-h-screen text-left">
                    {/* 상단 헤더 */}
                    <header className="sticky top-0 z-50 w-full bg-[#00704A] h-16 flex items-center justify-between px-6 shadow-xl text-white">
                        <div className="flex items-center gap-3">
                            <div className="w-9 h-9 bg-white/10 rounded-xl flex items-center justify-center border border-white/20">
                                <i data-lucide="bookmark" className="w-5 h-5 text-white"></i>
                            </div>
                            <h1 className="text-sm font-black uppercase italic tracking-[0.2em]">Hyun's Archive</h1>
                        </div>
                        <div className="flex items-center gap-4">
                            <button onClick={() => setIsMenuOpen(true)} className="p-2 hover:bg-white/10 rounded-full transition-all text-white">
                                <i data-lucide="menu" className="w-6 h-6"></i>
                            </button>
                        </div>
                    </header>

                    {/* 메인 레이아웃 */}
                    <main className="max-w-5xl mx-auto pb-24 px-8">
                        <section className="pt-20 pb-12">
                            <div className="flex items-center gap-3 mb-6">
                                <div className="h-[3px] w-10 bg-[#00704A]"></div>
                                <span className="text-[11px] font-black uppercase tracking-[0.4em] text-[#00704A]">Dashboard</span>
                            </div>
                            <h2 className="text-5xl md:text-6xl font-black tracking-tighter leading-[1.05] mb-6 text-[#2D2926]">
                                Record Everything.<br />
                                <span className="text-[#00704A]">Analyze Efficiently.</span>
                            </h2>
                        </section>

                        {/* 리액트 가로 스크롤 카드 리스트 */}
                        <section className="py-8">
                            <div className="flex overflow-x-auto no-scrollbar gap-6 py-4 snap-x snap-mandatory">
                                {posts.map(post => (
                                    <div key={post.id} className="flex-shrink-0 w-[80vw] md:w-[400px] snap-center">
                                        <div className="bg-white rounded-[40px] p-10 h-[280px] flex flex-col justify-between border border-[#EAE9E0] shadow-sm hover:shadow-xl transition-all group">
                                            <div>
                                                <div className="flex justify-between items-center mb-6">
                                                    <span className="text-[10px] font-black uppercase tracking-widest px-4 py-1.5 rounded-full text-white" style={{ backgroundColor: post.color }}>
                                                        {post.tag}
                                                    </span>
                                                    <span className="text-[11px] font-bold text-gray-300 italic">{post.date}</span>
                                                </div>
                                                <h4 className="text-xl font-black text-[#2D2926] group-hover:text-[#00704A] transition-colors">{post.title}</h4>
                                                <p className="text-sm text-gray-400 mt-2 line-clamp-2">{post.desc}</p>
                                            </div>
                                            <div className="flex items-center justify-between pt-6 border-t border-gray-50 text-[#00704A]">
                                                <span className="text-[11px] font-black uppercase">Inspect Data</span>
                                                <i data-lucide="arrow-right" className="w-5 h-5"></i>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </section>
                    </main>

                    {/* 사이드바 오버레이 */}
                    <div className={`fixed inset-0 z-[100] transition-all duration-500 ${isMenuOpen ? 'visible' : 'invisible'}`}>
                        <div className={`absolute inset-0 bg-black/40 backdrop-blur-sm transition-opacity ${isMenuOpen ? 'opacity-100' : 'opacity-0'}`} onClick={() => setIsMenuOpen(false)}></div>
                        <div className={`absolute top-0 right-0 h-full w-72 bg-white shadow-2xl transition-transform duration-500 ${isMenuOpen ? 'translate-x-0' : 'translate-x-full'}`}>
                            <div className="p-10 flex flex-col h-full text-left">
                                <button onClick={() => setIsMenuOpen(false)} className="self-end mb-12 p-2">
                                    <i data-lucide="x" className="w-6 h-6 text-gray-400"></i>
                                </button>
                                <nav className="space-y-6 text-lg font-bold text-gray-400">
                                    {['Home', 'Fitness', 'Study', 'Photo'].map(item => (
                                        <div key={item} className="hover:text-[#00704A] cursor-pointer transition-colors border-b border-gray-50 pb-2">{item}</div>
                                    ))}
                                </nav>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
